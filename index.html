<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Hunt KDA Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Roboto:wght@300;400;500&family=UnifrakturCook:wght@700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg-black: #020205;
      --panel-bg: #111015;
      --panel-inner: #18161d;
      --crimson: #b3263a;
      --crimson-light: #e04a5a;
      --crimson-deep: #6b1220;
      --text-main: #f5f2f7;
      --text-muted: #a39aa9;
      --accent-gold: #c9a96a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, #15121f 0, #050308 40%, #020205 100%);
      color: var(--text-main);
      font-family: "Roboto", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .fog-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 10% 0%, rgba(255,255,255,0.04) 0, transparent 55%),
        radial-gradient(circle at 90% 20%, rgba(255,255,255,0.03) 0, transparent 60%),
        radial-gradient(circle at 50% 100%, rgba(255,255,255,0.02) 0, transparent 65%);
      mix-blend-mode: screen;
      opacity: 0.6;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 960px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .title-block {
      text-align: center;
      margin-bottom: 4px;
    }

    .title-block h1 {
      font-family: "Cinzel", serif;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-size: 1.4rem;
      color: var(--accent-gold);
      text-shadow: 0 0 12px rgba(0, 0, 0, 0.9);
    }

    .title-block h1 span { color: var(--crimson); }

    .title-block p {
      margin-top: 6px;
      font-size: 0.9rem;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .panel {
      position: relative;
      background: radial-gradient(circle at top, #221b24 0, var(--panel-bg) 40%, #0a070c 100%);
      border-radius: 10px;
      padding: 18px;
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.9),
        0 0 24px rgba(0,0,0,0.9),
        0 0 32px rgba(179,38,58,0.35);
      overflow: hidden;
    }

    .panel-inner {
      background: linear-gradient(145deg, rgba(10,7,12,0.9), rgba(24,22,30,0.96));
      border-radius: 8px;
      padding: 16px;
      border: 1px solid rgba(255,255,255,0.04);
      box-shadow:
        inset 0 0 18px rgba(0,0,0,0.9),
        0 0 18px rgba(0,0,0,0.8);
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 14px;
      gap: 12px;
    }

    .panel-header h2 {
      font-family: "Cinzel", serif;
      font-size: 1.05rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--crimson);
    }

    .panel-header span {
      font-size: 0.8rem;
      color: var(--text-muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px 18px;
    }

    @media (max-width: 720px) {
      .grid { grid-template-columns: 1fr; }
    }

    .field { display: flex; flex-direction: column; gap: 4px; }

    .field label {
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .field input[type="number"] {
      background: radial-gradient(circle at top, #26212c 0, #15121b 40%, #0b090f 100%);
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.06);
      padding: 7px 9px;
      color: var(--text-main);
      font-size: 0.9rem;
      outline: none;
      box-shadow:
        inset 0 0 10px rgba(0,0,0,0.9),
        0 0 0 1px rgba(0,0,0,0.7);
      -moz-appearance: textfield;
    }

    .field input[type="number"]::-webkit-outer-spin-button,
    .field input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .field input[type="number"]:focus {
      border-color: var(--crimson);
      box-shadow:
        0 0 0 1px rgba(179,38,58,0.7),
        0 0 14px rgba(179,38,58,0.4);
      background: radial-gradient(circle at top, #2d2634 0, #18141f 40%, #0d0a11 100%);
    }

    .btn-row {
      margin-top: 16px;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      cursor: pointer;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      padding: 7px 16px;
      font-size: 0.85rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      background: radial-gradient(circle at top, #2b1a1f 0, #1a1014 40%, #0b0507 100%);
      color: var(--text-main);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.9),
        0 0 14px rgba(0,0,0,0.9);
    }

    button span.dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: radial-gradient(circle, var(--crimson) 0, #3b050c 70%);
      box-shadow: 0 0 8px rgba(179,38,58,0.7);
    }

    .results {
      margin-top: 18px;
      border-top: 1px solid rgba(255,255,255,0.06);
      padding-top: 14px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px 14px;
    }

    @media (max-width: 720px) {
      .results { grid-template-columns: 1fr; }
    }

    .result-block {
      background: radial-gradient(circle at top, #241821 0, #151018 40%, #09060c 100%);
      border-radius: 8px;
      padding: 10px 11px 11px;
      border: 1px solid rgba(255,255,255,0.04);
      box-shadow:
        inset 0 0 10px rgba(0,0,0,0.9),
        0 0 12px rgba(0,0,0,0.8);
    }

    .result-label {
      font-size: 0.75rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .result-value {
      font-family: "UnifrakturCook", serif;
      font-size: 1.8rem; /* ~50% bigger */
      letter-spacing: 0.02em;
      color: var(--crimson-light);
      text-shadow:
        0 0 6px rgba(0,0,0,0.9),
        0 0 8px rgba(179,38,58,0.5);
    }

    /* CURRENT KDA + HEART */
    .kda-main-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .heart-wrapper {
      width: 160px;
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: visible;
    }

    .heart-pulse {
      width: 160px;
      height: 160px;
      animation: heartPulse 1.4s ease-in-out infinite;
    }

    .heart-graphic {
      width: 100%;
      height: 100%;
      background-image: url("./heart-gothic.png");
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      filter:
        drop-shadow(0 0 12px rgba(0,0,0,0.9))
        drop-shadow(0 0 14px rgba(179,38,58,0.4));
    }

    @keyframes heartPulse {
      0% { transform: scale(1); }
      30% { transform: scale(1.06); }
      60% { transform: scale(1); }
      100% { transform: scale(1); }
    }

    .footer-note {
      margin-top: 10px;
      font-size: 0.75rem;
      color: var(--text-muted);
      text-align: right;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* GRAPH PANEL */
    .sparkline-container {
      margin-top: 6px;
      background: radial-gradient(circle at top, #241821 0, #151018 40%, #09060c 100%);
      border-radius: 8px;
      padding: 10px 11px 12px;
      border: 1px solid rgba(255,255,255,0.04);
      box-shadow:
        inset 0 0 10px rgba(0,0,0,0.9),
        0 0 12px rgba(0,0,0,0.8);
    }

    .sparkline-shell {
      position: relative;
      width: 100%;
      height: 160px;
      border-radius: 6px;
      overflow: visible;
    }

    #kdaGraph {
      width: 100%;
      height: 100%;
      display: block;
    }

    .sparkline-tooltip {
      position: fixed;
      pointer-events: none;
      background: radial-gradient(circle at top, #2b1a1f 0, #14090d 40%, #050103 100%);
      color: var(--text-main);
      padding: 6px 9px;
      border-radius: 6px;
      font-size: 0.75rem;
      border: 1px solid rgba(179,38,58,0.7);
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.9),
        0 0 16px rgba(179,38,58,0.6);
      opacity: 0;
      transform: translate(-50%, -120%);
      transition: opacity 0.12s ease;
      z-index: 20;
      white-space: nowrap;
    }

    .sparkline-tooltip.visible { opacity: 1; }
  </style>
</head>

<body>
  <div class="fog-overlay"></div>

  <div class="container">
    <div class="title-block">
      <h1><span>Hunt</span> KDA Ledger</h1>
      <p>Charred record of your bayou performance</p>
    </div>

    <!-- MAIN LEDGER -->
    <div class="panel">
      <div class="panel-inner">
        <div class="panel-header">
          <h2>Blooded Stats</h2>
          <span>No place for remorse in the life of a hunter.</span>
        </div>

        <div class="grid">
          <div class="field">
            <label for="kills">Kills</label>
            <input id="kills" type="number" min="0" step="1" value="0" />
          </div>

          <div class="field">
            <label for="assists">Assists</label>
            <input id="assists" type="number" min="0" step="1" value="0" />
          </div>

          <div class="field">
            <label for="deaths">Deaths</label>
            <input id="deaths" type="number" min="0" step="1" value="0" />
          </div>
        </div>

        <div class="btn-row">
          <button id="calcBtn"><span class="dot"></span>Calculate</button>
          <button id="resetBtn"><span class="dot"></span>Reset</button>
        </div>

        <div class="results">
          <!-- CURRENT KDA -->
          <div class="result-block">
            <div class="result-label">Current KDA</div>
            <div class="kda-main-row">
              <div class="result-value" id="currentKda">0.00</div>
              <div class="heart-wrapper">
                <div class="heart-pulse">
                  <div class="heart-graphic"></div>
                </div>
              </div>
            </div>
          </div>

          <!-- KA +0.01 (label cleaned) -->
          <div class="result-block">
            <div class="result-label">Kills / Assists to go up</div>
            <div class="result-value" id="killsToGoUp">0</div>
          </div>

          <!-- DEATHS -0.01 (label cleaned) -->
          <div class="result-block">
            <div class="result-label">Deaths to go down</div>
            <div class="result-value" id="deathsToGoDown">0</div>
          </div>
        </div>

        <div class="footer-note">The bayou is never kind.</div>
      </div>
    </div>

    <!-- GRAPH PANEL -->
    <div class="panel">
      <div class="panel-inner">
        <div class="panel-header">
          <h2>KDA Evolution</h2>
          <span>Ledger trend over recent hunts</span>
        </div>

        <div class="sparkline-container">
          <div class="sparkline-shell">
            <svg id="kdaGraph" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="sparkTooltip" class="sparkline-tooltip"></div>

  <script>
    const killsInput = document.getElementById("kills");
    const assistsInput = document.getElementById("assists");
    const deathsInput = document.getElementById("deaths");

    const currentKdaEl = document.getElementById("currentKda");
    const killsToGoUpEl = document.getElementById("killsToGoUp");
    const deathsToGoDownEl = document.getElementById("deathsToGoDown");

    const calcBtn = document.getElementById("calcBtn");
    const resetBtn = document.getElementById("resetBtn");

    const graphSvg = document.getElementById("kdaGraph");
    const tooltip = document.getElementById("sparkTooltip");

    let kdaHistory = [];

    function parseNumber(el) {
      const v = parseFloat(el.value);
      return isNaN(v) ? 0 : v;
    }

    function calculate() {
      const kills = Math.max(0, parseNumber(killsInput));
      const assists = Math.max(0, parseNumber(assistsInput));
      const deaths = Math.max(0, parseNumber(deathsInput));

      const totalKA = kills + assists;

      let currentKda;
      if (deaths === 0) {
        currentKda = totalKA === 0 ? 0 : Infinity;
      } else {
        currentKda = totalKA / deaths;
      }

      if (currentKda === Infinity) {
        currentKdaEl.textContent = "∞";
      } else {
        currentKdaEl.textContent = currentKda.toFixed(2);
      }

      // +0.01 KDA logic
      if (isFinite(currentKda) && deaths > 0) {
        const targetUp = currentKda + 0.01;
        const neededKA = targetUp * deaths;
        const diff = neededKA - totalKA;
        killsToGoUpEl.textContent = diff <= 0 ? 0 : Math.ceil(diff);
      } else {
        killsToGoUpEl.textContent = 0;
      }

      // -0.01 KDA logic
      if (isFinite(currentKda) && currentKda > 0) {
        const targetDown = currentKda - 0.01;
        if (targetDown <= 0) {
          deathsToGoDownEl.textContent = 0;
        } else {
          const maxDeaths = totalKA / targetDown;
          const diff = Math.floor(maxDeaths - deaths);
          deathsToGoDownEl.textContent = diff <= 0 ? 0 : diff;
        }
      } else {
        deathsToGoDownEl.textContent = 0;
      }

      if (isFinite(currentKda)) {
        addKdaPoint(currentKda);
      }
    }

    function reset() {
      killsInput.value = "0";
      assistsInput.value = "0";
      deathsInput.value = "0";
      currentKdaEl.textContent = "0.00";
      killsToGoUpEl.textContent = "0";
      deathsToGoDownEl.textContent = "0";
      kdaHistory = [];
      drawGraph();
    }

    function addKdaPoint(value) {
      const now = new Date();
      kdaHistory.push({ time: now, value: value });
      if (kdaHistory.length > 30) kdaHistory.shift();
      drawGraph();
    }

    function drawGraph() {
      while (graphSvg.firstChild) graphSvg.removeChild(graphSvg.firstChild);
      if (kdaHistory.length === 0) return;

      const values = kdaHistory.map(p => p.value);
      const minVal = Math.min(...values);
      const maxVal = Math.max(...values);
      const range = maxVal - minVal || 1;

      const points = kdaHistory.map((p, idx) => {
        const x = (idx / Math.max(kdaHistory.length - 1, 1)) * 100;
        const y = 90 - ((p.value - minVal) / range) * 70; // 20–90 band
        return { x, y };
      });

      // Gradient defs (crimson theme)
      const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
      const grad = document.createElementNS("http://www.w3.org/2000/svg", "linearGradient");
      grad.setAttribute("id", "kdaLineGradient");
      grad.setAttribute("x1", "0%");
      grad.setAttribute("y1", "0%");
      grad.setAttribute("x2", "100%");
      grad.setAttribute("y2", "0%");
      const s1 = document.createElementNS("http://www.w3.org/2000/svg", "stop");
      s1.setAttribute("offset", "0%");
      s1.setAttribute("stop-color", "#e04a5a");
      const s2 = document.createElementNS("http://www.w3.org/2000/svg", "stop");
      s2.setAttribute("offset", "50%");
      s2.setAttribute("stop-color", "#c73545");
      const s3 = document.createElementNS("http://www.w3.org/2000/svg", "stop");
      s3.setAttribute("offset", "100%");
      s3.setAttribute("stop-color", "#6b1220");
      grad.appendChild(s1); grad.appendChild(s2); grad.appendChild(s3);
      defs.appendChild(grad);
      graphSvg.appendChild(defs);

      // Smooth-ish path (simple quadratic smoothing)
      let d = "";
      for (let i = 0; i < points.length; i++) {
        const p = points[i];
        if (i === 0) {
          d += `M ${p.x},${p.y}`;
        } else {
          const prev = points[i - 1];
          const cx = (prev.x + p.x) / 2;
          const cy = (prev.y + p.y) / 2;
          d += ` Q ${prev.x},${prev.y} ${cx},${cy}`;
        }
      }

      const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
      path.setAttribute("d", d);
      path.setAttribute("fill", "none");
      path.setAttribute("stroke", "url(#kdaLineGradient)");
      path.setAttribute("stroke-width", "1.1");
      path.setAttribute("stroke-linecap", "round");
      path.setAttribute("stroke-linejoin", "round");
      path.setAttribute("opacity", "0.95");
      graphSvg.appendChild(path);

      // Points (small, refined)
      points.forEach((pt, idx) => {
        const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        circle.setAttribute("cx", pt.x);
        circle.setAttribute("cy", pt.y);
        circle.setAttribute("r", idx === points.length - 1 ? 1.8 : 1.4);
        circle.setAttribute("fill", idx === points.length - 1 ? "#e04a5a" : "#6b1220");
        circle.setAttribute("stroke", "rgba(0,0,0,0.9)");
        circle.setAttribute("stroke-width", "0.5");
        circle.style.cursor = "pointer";
        circle.dataset.index = idx.toString();

        circle.addEventListener("mouseenter", (e) => {
          const i = parseInt(circle.dataset.index, 10);
          const entry = kdaHistory[i];
          const prev = i > 0 ? kdaHistory[i - 1] : null;
          let deltaText = "First entry";
          if (prev) {
            const delta = entry.value - prev.value;
            const sign = delta > 0 ? "+" : delta < 0 ? "-" : "";
            const mag = Math.abs(delta).toFixed(2);
            deltaText = `${sign}${mag} since last session`;
          }
          const timeStr = entry.time.toLocaleString([], {
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit",
            day: "2-digit",
            month: "2-digit"
          });
          tooltip.textContent = `${entry.value.toFixed(2)} KDA • ${deltaText} • ${timeStr}`;
          tooltip.classList.add("visible");
          positionTooltip(e);
        });

        circle.addEventListener("mousemove", (e) => {
          positionTooltip(e);
        });

        circle.addEventListener("mouseleave", () => {
          tooltip.classList.remove("visible");
        });

        graphSvg.appendChild(circle);
      });
    }

    function positionTooltip(evt) {
      tooltip.style.left = evt.clientX + "px";
      tooltip.style.top = evt.clientY + "px";
    }

    calcBtn.addEventListener("click", calculate);
    resetBtn.addEventListener("click", reset);
    [killsInput, assistsInput, deathsInput].forEach((el) => {
      el.addEventListener("input", calculate);
    });

    calculate();
  </script>
</body>
</html>
